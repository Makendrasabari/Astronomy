<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your Stackly astronomy network profile to manage coordinate scheduling and remote telescope time slots.">
  <title>Stackly - Login to the Space Network</title>
  
  <!-- AOS Library Styles -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Preloader script -->
  <script src="js/preloader.js"></script>
</head>
<body style="min-height: 100vh; background-color: var(--background);">

  <!-- Top Scroll Progress Bar -->
  <div id="progress-bar"></div>

  <!-- Custom trailing cursor glow -->
  <div id="cursor-glow"></div>

  <!-- Background Space Canvas -->
  <canvas id="cosmic-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;"></canvas>



  <!-- Main Content Wrapper -->
  <main style="position: relative; z-index: 2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
    
    <!-- Go Back to Home Button -->
    <a href="index.html" class="go-back-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      <span>Back to Home</span>
    </a>

    <div class="login-container" data-aos="zoom-in">
      <div class="login-split">
        <!-- Left Side: Deep Space Graphic -->
        <div class="login-graphic">
          <div class="login-graphic-bg">
            <img src="assets/images/login_hero.webp" alt="Cosmic Planet Glow" class="login-hero-image">
            <div class="login-graphic-overlay"></div>
          </div>
          <div class="login-graphic-text">
            <span class="cosmic-subtitle">Celestial Gateway</span>
            <h2 class="cosmic-title">Unlock the Wonders of Deep Space</h2>
            <p class="cosmic-quote">"Somewhere, something incredible is waiting to be known." &mdash; Carl Sagan</p>
          </div>
        </div>
        
        <!-- Right Side: Login Form -->
        <div class="login-form-panel">
          <div class="login-form-header">
            <div class="login-logo-container">
              <a href="index.html">
                <img class="login-logo" src="assets/images/logo (8).webp" alt="Stackly Logo">
              </a>
            </div>
            <h3>Welcome Back, Explorer</h3>
            <p>Access your astronomical coordinate scheduler and observation deck.</p>
          </div>
          
          <form id="login-form" class="login-form" onsubmit="event.preventDefault();">
            <!-- Email Input -->
            <div class="login-input-group">
              <label for="email">Observatory Email</label>
              <div class="input-wrapper">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="input-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <input type="email" id="email" class="login-input" placeholder="e.g. explorer@stackly.org" required>
              </div>
            </div>
            
            <!-- Password Input -->
            <div class="login-input-group">
              <label for="password">Security Password</label>
              <div class="input-wrapper">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="input-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input type="password" id="password" class="login-input" placeholder="Enter password" required minlength="2">
                <button type="button" id="password-toggle" class="password-toggle-btn" aria-label="Toggle password visibility">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="eye-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Session Role Select -->
            <div class="login-input-group">
              <label for="role">Session Role</label>
              <div class="input-wrapper">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="input-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
                <select id="role" class="login-input" style="background: rgba(5, 3, 20, 0.9); cursor: pointer;" required>
                  <option value="stargazer" selected>Stargazer</option>
                  <option value="admin">Mission Controller</option>
                </select>
              </div>
            </div>
            
            <!-- Remember Me / Forgot Password -->
            <div class="login-options" style="flex-wrap: wrap;">
              <label class="remember-me">
                <input type="checkbox" id="remember-me">
                <span class="checkmark"></span>
                <span>Keep me logged in</span>
              </label>
              <a href="404.html" class="forgot-password" id="forgot-password-link">Forgot Password?</a>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" id="submit-btn" class="btn btn-primary btn-ripple btn-login magnetic" disabled>
              <span>Initialize Skydeck Session</span>
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7m0 0l-7 7m7-7H3"/>
              </svg>
            </button>
            
            <div class="login-footer-text">
              <span>Don't have an account?</span>
              <a href="register.html">Create Account</a>
            </div>
          </form>
        </div>
      </div>
    </div>

  </main>

  <!-- AOS Library JS -->
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  
  <!-- Custom scripts -->
  <script src="js/main.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/login.js"></script>
  <script src="js/animations.js"></script>

</body>
</html>
